services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tj_shop
      POSTGRES_PASSWORD: tj_shop
      POSTGRES_DB: tj_shop
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tj_shop -d tj_shop"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
